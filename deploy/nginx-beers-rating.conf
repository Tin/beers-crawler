# Include inside the TLS server block that serves your public host.
# ^~ avoids other location regexes (e.g. CMS static rules) stealing assets.
#
# Replace DEPLOY_ROOT with the install path (deploy.sh does this automatically).

# API → uvicorn 127.0.0.1:8741
# /beers/rating/api/health → http://127.0.0.1:8741/health
location ^~ /beers/rating/api/ {
    proxy_pass http://127.0.0.1:8741/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
}

location = /beers/rating {
    return 301 /beers/rating/;
}

# Vue SPA static files
location ^~ /beers/rating/ {
    alias DEPLOY_ROOT/web/dist/;
    index index.html;
}
